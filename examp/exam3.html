<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<link rel="stylesheet" href="../css/all.css">
<link rel="stylesheet" href="../css/bootstrap.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

    <div class="container">
        <section class="mt-5">
            <div class="row ">
                <div class="col-md-2 mb-4">
                    <nav class="navbar bg-danger-subtle rounded ">

                        <i class="fa-solid  fa-pen-to-square"> </i> <a class="navbar-brand mx-auto "
                            href="../exam.html">GO EXAM PAGE </a>

                    </nav>

                </div>
                <div class="col-md-8 mx-auto bg-success-subtle shadow rounded p-3 ">
                    <div class="row ">
                        <div class="col-6 col-md-6 rounded bg-danger-subtle text-center p-2">
                            <strong>Higher Math-1st Paper</strong>
                        </div>
                        <div class="col-6 col-md-6 rounded bg-primary-subtle navy3 text-center p-2">
                            <strong>DURATION: <span id="examTimer">10:00 </span> Min</strong>
                        </div>
                        <div class="col-md-12">
                            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdFC8Owl7vZxgNJohXhgQArv3zoZIcyMkVkM8U0Gue7T0kphw/viewform?embedded=true" width="100%" height="900" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
                        </div>
                    </div>

                </div>
            </div>
        

        </section>
    </div>

    <footer>

    </footer>
    <script src="../js/bootstrap.bundle.min.js"></script>
    
    <script>
        // মোট সময় (যেমন 10 মিনিট = 600 সেকেন্ড)
        let timeLeft = 10 * 60;

        function updateTimer() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            document.getElementById("examTimer").innerHTML =
                minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

            if (timeLeft > 0) {
                timeLeft--;   // প্রতি সেকেন্ডে কমবে
            } else {
                clearInterval(timerInterval);
                alert("⏰ সময় শেষ!");
            }
        }

        // প্রথমে একবার কল করে 10:00 দেখাবে
        updateTimer();

        // ওয়েবসাইটে ঢুকলেই Timer শুরু হবে
        let timerInterval = setInterval(updateTimer, 1000);

    </script>
</body>

</html>
